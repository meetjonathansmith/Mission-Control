<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Scoreboard | DOXA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #fff;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: linear-gradient(135deg, #1e2442 0%, #151b3d 100%);
            border: 1px solid #2a2f4f;
            border-radius: 12px;
            padding: 25px;
            transition: transform 0.3s;
        }

        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .metric-card.highlight {
            border-color: #10b981;
            background: linear-gradient(135deg, #1a2a1a 0%, #101a10 100%);
        }

        .metric-label {
            font-size: 13px;
            text-transform: uppercase;
            opacity: 0.6;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 42px;
            font-weight: 700;
            color: #10b981;
            margin-bottom: 5px;
        }

        .metric-subtext {
            font-size: 12px;
            opacity: 0.7;
        }

        .agent-leaderboard {
            background: #1e2442;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .leaderboard-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .agent-row {
            display: grid;
            grid-template-columns: 60px 1fr 150px 120px;
            gap: 15px;
            padding: 15px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 8px;
            margin-bottom: 10px;
            align-items: center;
            transition: all 0.3s;
        }

        .agent-row:hover {
            background: rgba(102, 126, 234, 0.15);
            transform: translateX(5px);
        }

        .agent-row.top3 {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05));
            border-left: 4px solid #10b981;
        }

        .agent-rank {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            text-align: center;
        }

        .agent-row.top3 .agent-rank {
            color: #10b981;
        }

        .agent-name {
            font-size: 16px;
            font-weight: 600;
        }

        .agent-deals {
            font-size: 14px;
            opacity: 0.7;
            text-align: center;
        }

        .agent-revenue {
            font-size: 20px;
            font-weight: 700;
            color: #10b981;
            text-align: right;
        }

        .trends-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .trend-card {
            background: #1e2442;
            border-radius: 12px;
            padding: 25px;
        }

        .trend-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .trend-value {
            font-size: 32px;
            font-weight: 700;
            color: #10b981;
            margin-bottom: 5px;
        }

        .trend-comparison {
            font-size: 13px;
            opacity: 0.6;
        }

        .last-updated {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .agent-row {
                grid-template-columns: 40px 1fr 100px;
            }

            .agent-deals {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💰 Revenue Scoreboard</h1>
        <div class="subtitle">Closed deals & agent performance</div>
    </div>

    <div class="metrics-grid" id="metrics-grid">
        <div class="loading">Loading revenue data...</div>
    </div>

    <div class="trends-section" id="trends-section"></div>

    <div class="agent-leaderboard">
        <div class="leaderboard-header">
            <span>🏆 Top Performers</span>
            <span style="font-size: 14px; opacity: 0.6;">Lifetime Closed Deals</span>
        </div>
        <div id="leaderboard"></div>
    </div>

    <div class="last-updated" id="last-updated">Loading...</div>

    <script>
        const GHL_TOKEN = 'pit-34f02155-ae81-4f06-95aa-0bcb4239518d';
        const LOCATION_ID = 'ZsNsqaZULO6gGQhingYC';
        const PIPELINE_ID = 'gkBz7GpqzEUAsZVfWBu7';
        const CLOSED_STAGE_ID = 'd37d75d3-688f-4cc2-8541-ad516bcde91b';

        async function fetchClosedDeals() {
            try {
                const response = await fetch(`https://services.leadconnectorhq.com/opportunities/search?location_id=${LOCATION_ID}&pipelineId=${PIPELINE_ID}&pipelineStageId=${CLOSED_STAGE_ID}&limit=1000`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${GHL_TOKEN}`,
                        'Version': '2021-07-28'
                    }
                });

                const data = await response.json();
                return data.opportunities || [];
            } catch (error) {
                console.error('Error fetching closed deals:', error);
                return [];
            }
        }

        function calculateMetrics(deals) {
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            const totalRevenue = deals.reduce((sum, deal) => sum + (deal.monetaryValue || 0), 0);
            const totalDeals = deals.length;
            const avgDealSize = totalDeals > 0 ? totalRevenue / totalDeals : 0;

            // This month
            const thisMonthDeals = deals.filter(deal => {
                const closedDate = new Date(deal.lastStatusChangeAt || deal.dateUpdated);
                return closedDate.getMonth() === currentMonth && closedDate.getFullYear() === currentYear;
            });

            const thisMonthRevenue = thisMonthDeals.reduce((sum, deal) => sum + (deal.monetaryValue || 0), 0);

            // Last month
            const lastMonth = currentMonth === 0 ? 11 : currentMonth - 1;
            const lastMonthYear = currentMonth === 0 ? currentYear - 1 : currentYear;
            
            const lastMonthDeals = deals.filter(deal => {
                const closedDate = new Date(deal.lastStatusChangeAt || deal.dateUpdated);
                return closedDate.getMonth() === lastMonth && closedDate.getFullYear() === lastMonthYear;
            });

            const lastMonthRevenue = lastMonthDeals.reduce((sum, deal) => sum + (deal.monetaryValue || 0), 0);

            // YTD
            const ytdDeals = deals.filter(deal => {
                const closedDate = new Date(deal.lastStatusChangeAt || deal.dateUpdated);
                return closedDate.getFullYear() === currentYear;
            });

            const ytdRevenue = ytdDeals.reduce((sum, deal) => sum + (deal.monetaryValue || 0), 0);

            // Agent breakdown
            const byAgent = {};
            deals.forEach(deal => {
                const agentName = deal.contact?.name || 'Unknown';
                if (!byAgent[agentName]) {
                    byAgent[agentName] = { deals: 0, revenue: 0 };
                }
                byAgent[agentName].deals++;
                byAgent[agentName].revenue += (deal.monetaryValue || 0);
            });

            // Sort agents by revenue
            const topAgents = Object.entries(byAgent)
                .map(([name, data]) => ({ name, ...data }))
                .sort((a, b) => b.revenue - a.revenue)
                .slice(0, 20);

            return {
                totalRevenue,
                totalDeals,
                avgDealSize,
                thisMonthRevenue,
                thisMonthDeals: thisMonthDeals.length,
                lastMonthRevenue,
                lastMonthDeals: lastMonthDeals.length,
                ytdRevenue,
                ytdDeals: ytdDeals.length,
                topAgents
            };
        }

        function formatCurrency(num) {
            if (num >= 1000000) return '$' + (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return '$' + (num / 1000).toFixed(1) + 'K';
            return '$' + num.toLocaleString();
        }

        function renderMetrics(metrics) {
            const monthOverMonth = metrics.lastMonthRevenue > 0 
                ? ((metrics.thisMonthRevenue - metrics.lastMonthRevenue) / metrics.lastMonthRevenue * 100).toFixed(0)
                : 0;

            const html = `
                <div class="metric-card highlight">
                    <div class="metric-label">Total Revenue (Lifetime)</div>
                    <div class="metric-value">${formatCurrency(metrics.totalRevenue)}</div>
                    <div class="metric-subtext">${metrics.totalDeals} closed deals</div>
                </div>

                <div class="metric-card">
                    <div class="metric-label">This Month (MTD)</div>
                    <div class="metric-value">${formatCurrency(metrics.thisMonthRevenue)}</div>
                    <div class="metric-subtext">${metrics.thisMonthDeals} deals closed</div>
                </div>

                <div class="metric-card">
                    <div class="metric-label">YTD 2026</div>
                    <div class="metric-value">${formatCurrency(metrics.ytdRevenue)}</div>
                    <div class="metric-subtext">${metrics.ytdDeals} deals closed</div>
                </div>

                <div class="metric-card">
                    <div class="metric-label">Avg Deal Size</div>
                    <div class="metric-value">${formatCurrency(metrics.avgDealSize)}</div>
                    <div class="metric-subtext">Across all deals</div>
                </div>
            `;

            document.getElementById('metrics-grid').innerHTML = html;
        }

        function renderTrends(metrics) {
            const monthOverMonth = metrics.lastMonthRevenue > 0 
                ? ((metrics.thisMonthRevenue - metrics.lastMonthRevenue) / metrics.lastMonthRevenue * 100).toFixed(0)
                : 0;

            const html = `
                <div class="trend-card">
                    <div class="trend-title">Month-over-Month</div>
                    <div class="trend-value">${monthOverMonth >= 0 ? '+' : ''}${monthOverMonth}%</div>
                    <div class="trend-comparison">vs last month: ${formatCurrency(metrics.lastMonthRevenue)}</div>
                </div>

                <div class="trend-card">
                    <div class="trend-title">Last Month</div>
                    <div class="trend-value">${formatCurrency(metrics.lastMonthRevenue)}</div>
                    <div class="trend-comparison">${metrics.lastMonthDeals} deals closed</div>
                </div>

                <div class="trend-card">
                    <div class="trend-title">Run Rate</div>
                    <div class="trend-value">${formatCurrency(metrics.thisMonthRevenue * (30 / new Date().getDate()))}</div>
                    <div class="trend-comparison">Based on current MTD pace</div>
                </div>
            `;

            document.getElementById('trends-section').innerHTML = html;
        }

        function renderLeaderboard(agents) {
            const html = agents.map((agent, index) => `
                <div class="agent-row ${index < 3 ? 'top3' : ''}">
                    <div class="agent-rank">#${index + 1}</div>
                    <div class="agent-name">${agent.name}</div>
                    <div class="agent-deals">${agent.deals} deal${agent.deals !== 1 ? 's' : ''}</div>
                    <div class="agent-revenue">${formatCurrency(agent.revenue)}</div>
                </div>
            `).join('');

            document.getElementById('leaderboard').innerHTML = html;
        }

        async function refreshData() {
            console.log('Refreshing revenue data...');

            const deals = await fetchClosedDeals();

            if (deals.length === 0) {
                document.getElementById('metrics-grid').innerHTML = 
                    '<div class="loading">❌ No closed deals found or API error</div>';
                return;
            }

            const metrics = calculateMetrics(deals);

            renderMetrics(metrics);
            renderTrends(metrics);
            renderLeaderboard(metrics.topAgents);

            const now = new Date();
            document.getElementById('last-updated').textContent = 
                `Updated: ${now.toLocaleTimeString()}`;
        }

        // Initial load
        refreshData();

        // Auto-refresh every hour
        setInterval(refreshData, 60 * 60 * 1000);
    </script>
</body>
</html>
