<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Scoreboard | DOXA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #fff;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: linear-gradient(135deg, #1e2442 0%, #151b3d 100%);
            border: 1px solid #2a2f4f;
            border-radius: 12px;
            padding: 25px;
            transition: transform 0.3s;
        }

        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .metric-card.critical {
            border-color: #ef4444;
            background: linear-gradient(135deg, #2a1a1a 0%, #1a1010 100%);
        }

        .metric-card.good {
            border-color: #10b981;
            background: linear-gradient(135deg, #1a2a1a 0%, #101a10 100%);
        }

        .metric-label {
            font-size: 13px;
            text-transform: uppercase;
            opacity: 0.6;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 42px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .metric-card.critical .metric-value {
            color: #ef4444;
        }

        .metric-card.good .metric-value {
            color: #10b981;
        }

        .metric-change {
            font-size: 12px;
            opacity: 0.8;
        }

        .metric-change.up {
            color: #10b981;
        }

        .metric-change.down {
            color: #ef4444;
        }

        .stages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stage-card {
            background: #1e2442;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
        }

        .stage-name {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .stage-count {
            font-size: 28px;
            font-weight: 700;
        }

        .stage-value {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .refresh-info {
            text-align: center;
            padding: 20px;
            background: #151b3d;
            border-radius: 8px;
            font-size: 12px;
            opacity: 0.6;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
        }

        .last-updated {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #667eea;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .metrics-grid {
                grid-template-columns: 1fr;
            }
            
            .stages-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Pipeline Scoreboard</h1>
        <div class="subtitle">Real-time deal flow & pipeline health</div>
    </div>

    <div class="metrics-grid" id="metrics-grid">
        <div class="loading">Loading pipeline data...</div>
    </div>

    <h3 style="margin: 30px 0 15px 0; opacity: 0.8;">Deals by Stage</h3>
    <div class="stages-grid" id="stages-grid"></div>

    <div class="refresh-info">
        Auto-refreshes every hour • Zero AI cost after initial build
    </div>

    <div class="last-updated" id="last-updated">
        Loading...
    </div>

    <script>
        const GHL_TOKEN = 'pit-34f02155-ae81-4f06-95aa-0bcb4239518d';
        const LOCATION_ID = 'ZsNsqaZULO6gGQhingYC';
        const PIPELINE_ID = 'gkBz7GpqzEUAsZVfWBu7';

        let previousData = null;

        async function fetchPipelineData() {
            try {
                // Fetch all opportunities from the pipeline
                const response = await fetch(`https://services.leadconnectorhq.com/opportunities/search?location_id=${LOCATION_ID}&pipelineId=${PIPELINE_ID}&limit=1000`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${GHL_TOKEN}`,
                        'Version': '2021-07-28'
                    }
                });

                const data = await response.json();
                return data.opportunities || [];
            } catch (error) {
                console.error('Error fetching pipeline data:', error);
                return [];
            }
        }

        function calculateMetrics(opportunities) {
            const now = Date.now();
            const weekAgo = now - (7 * 24 * 60 * 60 * 1000);
            const monthAgo = now - (30 * 24 * 60 * 60 * 1000);

            const totalDeals = opportunities.length;
            const totalValue = opportunities.reduce((sum, opp) => sum + (opp.monetaryValue || 0), 0);
            
            const hotDeals = opportunities.filter(opp => {
                const created = new Date(opp.createdAt).getTime();
                return (now - created) < (7 * 24 * 60 * 60 * 1000);
            }).length;

            const staleDeals = opportunities.filter(opp => {
                const updated = new Date(opp.lastStatusChangeAt || opp.dateUpdated).getTime();
                return (now - updated) > (30 * 24 * 60 * 60 * 1000);
            }).length;

            const movedThisWeek = opportunities.filter(opp => {
                const updated = new Date(opp.lastStatusChangeAt || opp.dateUpdated).getTime();
                return updated > weekAgo;
            }).length;

            // Group by stage
            const byStage = {};
            opportunities.forEach(opp => {
                const stage = opp.status || 'Unknown';
                if (!byStage[stage]) {
                    byStage[stage] = { count: 0, value: 0 };
                }
                byStage[stage].count++;
                byStage[stage].value += (opp.monetaryValue || 0);
            });

            return {
                totalDeals,
                totalValue,
                hotDeals,
                staleDeals,
                movedThisWeek,
                byStage
            };
        }

        function formatCurrency(num) {
            if (num >= 1000000) return '$' + (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return '$' + (num / 1000).toFixed(0) + 'K';
            return '$' + num.toLocaleString();
        }

        function calculateChange(current, previous) {
            if (!previous) return null;
            const diff = current - previous;
            const percent = previous > 0 ? ((diff / previous) * 100).toFixed(0) : 0;
            return { diff, percent, direction: diff >= 0 ? 'up' : 'down' };
        }

        function renderMetrics(metrics) {
            const change = previousData ? calculateChange(metrics.totalDeals, previousData.totalDeals) : null;
            const valueChange = previousData ? calculateChange(metrics.totalValue, previousData.totalValue) : null;

            const html = `
                <div class="metric-card ${metrics.staleDeals > 10 ? 'critical' : ''}">
                    <div class="metric-label">Total Deals</div>
                    <div class="metric-value">${metrics.totalDeals}</div>
                    ${change ? `<div class="metric-change ${change.direction}">${change.direction === 'up' ? '↑' : '↓'} ${Math.abs(change.diff)} (${change.percent}%)</div>` : ''}
                </div>

                <div class="metric-card">
                    <div class="metric-label">Pipeline Value</div>
                    <div class="metric-value">${formatCurrency(metrics.totalValue)}</div>
                    ${valueChange ? `<div class="metric-change ${valueChange.direction}">${valueChange.direction === 'up' ? '↑' : '↓'} ${formatCurrency(Math.abs(valueChange.diff))}</div>` : ''}
                </div>

                <div class="metric-card good">
                    <div class="metric-label">🔥 Hot Deals</div>
                    <div class="metric-value">${metrics.hotDeals}</div>
                    <div class="metric-change">< 7 days old</div>
                </div>

                <div class="metric-card ${metrics.staleDeals > 15 ? 'critical' : ''}">
                    <div class="metric-label">❄️ Stale Deals</div>
                    <div class="metric-value">${metrics.staleDeals}</div>
                    <div class="metric-change">No activity 30+ days</div>
                </div>

                <div class="metric-card">
                    <div class="metric-label">Movement This Week</div>
                    <div class="metric-value">${metrics.movedThisWeek}</div>
                    <div class="metric-change">${(metrics.movedThisWeek / metrics.totalDeals * 100).toFixed(0)}% of pipeline</div>
                </div>

                <div class="metric-card">
                    <div class="metric-label">Velocity</div>
                    <div class="metric-value">${(metrics.movedThisWeek / 7).toFixed(1)}</div>
                    <div class="metric-change">deals/day moving</div>
                </div>
            `;

            document.getElementById('metrics-grid').innerHTML = html;
        }

        function renderStages(byStage) {
            const stages = Object.entries(byStage)
                .sort((a, b) => b[1].count - a[1].count);

            const html = stages.map(([stage, data]) => `
                <div class="stage-card">
                    <div class="stage-name">${stage}</div>
                    <div class="stage-count">${data.count}</div>
                    <div class="stage-value">${formatCurrency(data.value)}</div>
                </div>
            `).join('');

            document.getElementById('stages-grid').innerHTML = html;
        }

        async function refreshData() {
            console.log('Refreshing pipeline data...');
            
            const opportunities = await fetchPipelineData();
            
            if (opportunities.length === 0) {
                document.getElementById('metrics-grid').innerHTML = 
                    '<div class="loading">❌ Failed to load data. Check API credentials.</div>';
                return;
            }

            const metrics = calculateMetrics(opportunities);
            
            renderMetrics(metrics);
            renderStages(metrics.byStage);

            previousData = metrics;

            const now = new Date();
            document.getElementById('last-updated').textContent = 
                `Updated: ${now.toLocaleTimeString()}`;
        }

        // Initial load
        refreshData();

        // Auto-refresh every hour
        setInterval(refreshData, 60 * 60 * 1000);

        // Refresh every 5 minutes for testing (change to 1 hour in production)
        // setInterval(refreshData, 5 * 60 * 1000);
    </script>
</body>
</html>
